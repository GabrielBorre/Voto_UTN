<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaneo de Padrón | UTN BA</title>

    <link rel="stylesheet" href="css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="phone">

    <header>

        <div class="brand">

            <div class="logo">
                ✳
            </div>

            <div>
                <h2>UTN<span>.BA</span></h2>
                <p>Sistema de Gestión Electoral</p>
            </div>

        </div>

    </header>

    <main>

        <div class="step">
            Paso 1 de 3
        </div>

        <p class="subtitle">
            Encuadre el código QR ubicado en la portada del padrón para identificar automáticamente la mesa que será procesada.
        </p>   


        <div class="camera">

            <div class="scan-area">

                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>

                <div class="laser"></div>

                <div class="camera-text">

                    <div class="qr-icon">
                        ⌗
                    </div>

                    <strong>
                        QR DE LA PORTADA
                    </strong>

                    <span>
                        Centre el código dentro del recuadro
                    </span>

                </div>

            </div>

        </div>


        <div class="status">

            <div class="pulse"></div>

            Esperando QR...

        </div>

        <button class="secondary-button" id="finish">

            Carga manual

        </button>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
