{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d6efd">
  <title>{% block title %}Escaneo QR{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  {% block nav %}
    {% if user.is_authenticated %}
    <nav class="navbar navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="{% url 'election-list' %}">Voto UTN</a>
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button class="btn btn-sm btn-outline-light">Salir</button>
        </form>
      </div>
    </nav>
    {% endif %}
  {% endblock %}

  <main class="{% block main_class %}container py-4 py-md-5{% endblock %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
